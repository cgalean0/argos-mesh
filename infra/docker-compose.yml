services:
  db: ## Database configuration
    image: postgres:15-alpine
    container_name: shop_db
    restart: always
    environment:
      - POSTGRES_USER=user_shop
      - POSTGRES_PASSWORD=secretPassword #Only for environments of test
      - POSTGRES_DB=shop_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_shop -d shop_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argos-network

  app:
    build:
      context: ../orders
      dockerfile: Dockerfile
    container_name: shop_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shop_db
      SPRING_DATASOURCE_USERNAME: user_shop
      SPRING_DATASOURCE_PASSWORD: secretPassword
      # Configuration of RabbitMQ for the dashboard UI
      SPRING_RABBITMQ_HOST: message_broker
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
      # Configuration of Redis
      SPRING_DATA_REDIS_HOST: redis_db
      SPRING_DATA_REDIS_PORT: 6379
    restart: on-failure
    networks:
      - argos-network

  sentinel:
    build:
      context: ../sentinel
      dockerfile: Dockerfile
    container_name: sentinel_app
    depends_on:
      redis_db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      - SPRING_RABBITMQ_HOST=message_broker
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin123
      - SPRING_DATA_REDIS_HOST=redis_db
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_THREADS_VIRTUAL_ENABLED=true
    restart: on-failure
    networks:
        - argos-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: message_broker
    ports:
      - "5672:5672" #AMQP para Spring
      - "15672:15672" # Port for the web app
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    networks:
      - argos-network

  redis_db:
    image: redis:7.2-alpine
    container_name: black_list
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
        - argos-network

networks:
  argos-network:
    driver: bridge
volumes:
  postgres_data:
  redis_data:
